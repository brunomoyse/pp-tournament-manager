name: Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to rollback to (e.g. v1.0.0)'
        required: true
        type: string

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.actor }}/pp-tournament-manager

# ── Check (auto on every push) ───────────────────────────────────────────────

jobs:
  check:
    if: github.event_name == 'push'
    name: Lint + Format Check
    runs-on: ubuntu-latest
    # GraphQL codegen (run by `nuxt prepare` in postinstall) introspects the
    # backend, which is unavailable in CI. Disable it so install/prepare work
    # offline — same flag the Dockerfile uses.
    env:
      DISABLE_CODEGEN: 'true'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Format check (oxfmt)
        run: npm run format:check

  # ── Unit tests (auto on every push) ──────────────────────────────────────────

  test:
    if: github.event_name == 'push'
    name: Unit Tests
    runs-on: ubuntu-latest
    # `nuxt prepare` (postinstall) generates the `.nuxt/tsconfig.*` files vitest
    # needs; DISABLE_CODEGEN lets it run without the backend.
    env:
      DISABLE_CODEGEN: 'true'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- run

  # ── Build & deploy (auto on push to main) ────────────────────────────────────

  build_amd64:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    name: Build AMD64 Image
    needs: [check, test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.PAT }}" | docker login ${{ env.DOCKER_REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build and Push AMD64 Image
        run: |
          docker buildx build . \
            --platform linux/amd64 \
            --build-arg API_BASE_URL=${{ vars.API_BASE_URL }} \
            --tag ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64 \
            --push

  build_arm64:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    name: Build ARM64 Image
    needs: [check, test]
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.PAT }}" | docker login ${{ env.DOCKER_REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build and Push ARM64 Image
        run: |
          docker buildx build . \
            --platform linux/arm64 \
            --build-arg API_BASE_URL=${{ vars.API_BASE_URL }} \
            --tag ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64 \
            --push

  create_manifest:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    name: Create Multi-Architecture Manifest
    runs-on: ubuntu-latest
    needs: [build_amd64, build_arm64]

    steps:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.PAT }}" | docker login ${{ env.DOCKER_REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Create and Push Manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64 \
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64

  deploy_test:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    needs: create_manifest
    name: Deploy to Home Server
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy webhook
        run: |
          curl -X POST ${{ vars.DEPLOY_WEBHOOK_URL }} \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            --fail --max-time 300

  # ── Production release (tag push v*) ────────────────────────────────────────

  build_production:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    name: Build Production Image
    needs: [check, test]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.PAT }}" | docker login ${{ env.DOCKER_REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build and Push Production Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg API_BASE_URL=${{ vars.API_BASE_URL }} \
            --tag ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:production \
            --tag ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            --push \
            .

  deploy_production:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build_production
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.OVH_HOST }}
          username: ${{ vars.OVH_USER }}
          key: ${{ secrets.OVH_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/pocketpair
            docker compose pull pp-tournament-manager
            docker compose up -d pp-tournament-manager
            docker image prune -f

  # ── Rollback (manual trigger) ────────────────────────────────────────────────

  rollback:
    if: github.event_name == 'workflow_dispatch'
    name: Rollback Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.OVH_HOST }}
          username: ${{ vars.OVH_USER }}
          key: ${{ secrets.OVH_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/pocketpair
            docker pull ghcr.io/brunomoyse/pp-tournament-manager:${{ inputs.version }}
            docker tag ghcr.io/brunomoyse/pp-tournament-manager:${{ inputs.version }} ghcr.io/brunomoyse/pp-tournament-manager:production
            docker compose up -d pp-tournament-manager
            docker image prune -f
