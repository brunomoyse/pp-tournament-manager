query GetTournaments(
  $clubId: UUID
  $from: DateTime
  $to: DateTime
  $status: TournamentStatus
  $pagination: PaginationInput
) {
  tournaments(clubId: $clubId, from: $from, to: $to, status: $status, pagination: $pagination) {
    items {
      id
      title
      description
      clubId
      startTime
      endTime
      buyInCents
      rakeCents
      seatCap
      startingStack
      status
      liveStatus
      createdAt
      updatedAt
    }
    totalCount
    pageSize
    offset
    hasNextPage
  }
}

query GetTournament($id: UUID!) {
  tournament(id: $id) {
    id
    title
    description
    startTime
    endTime
    buyInCents
    rakeCents
    seatCap
    startingStack
    status
    liveStatus
    lateRegistrationLevel
    earlyBirdBonusChips
    levelTwoBonusChips
    voucherValueCents
    rebuyMax
    addonChips
    addonPriceCents
    bountyType
    bountyAmountCents
    leaderboardConfigId
    seriesId
    flightLabel
    isFinalDay
    structure {
      id
      tournamentId
      levelNumber
      smallBlind
      bigBlind
      ante
      durationMinutes
      isBreak
      breakDurationMinutes
    }
    clock {
      id
      tournamentId
      status
      currentLevel
      timeRemainingSeconds
      levelStartedAt
      levelEndTime
      totalPauseDurationSeconds
      autoAdvance
      currentStructure {
        id
        tournamentId
        levelNumber
        smallBlind
        bigBlind
        ante
        durationMinutes
        isBreak
        breakDurationMinutes
      }
      nextStructure {
        id
        tournamentId
        levelNumber
        smallBlind
        bigBlind
        ante
        durationMinutes
        isBreak
        breakDurationMinutes
      }
    }
    registrations {
      id
      userId
      clubPlayerId
      displayName
      registrationTime
      status
      notes
    }
  }
}

query GetTournamentPlayers($tournamentId: UUID!, $pagination: PaginationInput) {
  tournamentPlayers(tournamentId: $tournamentId, pagination: $pagination) {
    items {
      registration {
        id
        userId
        clubPlayerId
        registrationTime
        status
        notes
        waitlistPosition
      }
      displayName
      user {
        id
        firstName
        lastName
        username
        email
        role
      }
    }
    totalCount
    pageSize
    offset
    hasNextPage
  }
}

query GetTournamentPayout($tournamentId: ID!) {
  tournamentPayout(tournamentId: $tournamentId) {
    id
    tournamentId
    templateId
    playerCount
    totalPrizePool
    positions {
      position
      percentage
      amountCents
    }
    createdAt
    updatedAt
  }
}

query GetTournamentCashReport($tournamentId: ID!) {
  tournamentCashReport(tournamentId: $tournamentId) {
    tournamentId
    totalCollectedCents
    totalRakeCents
    prizePoolCents
    entryCount
    lines {
      paymentMethod
      entryType
      amountCents
      count
    }
  }
}

query GetTournamentResults($tournamentId: ID!) {
  tournamentResults(tournamentId: $tournamentId) {
    finalPosition
    prizeCents
    points
    displayName
  }
}

query GetTournamentEntryStats($tournamentId: ID!) {
  tournamentEntryStats(tournamentId: $tournamentId) {
    tournamentId
    totalEntries
    totalAmountCents
    uniquePlayers
    initialCount
    rebuyCount
    reEntryCount
    addonCount
    totalRakeCents
    totalChips
    playersRemaining
  }
}

query GetLeaderboard(
  $period: LeaderboardPeriod
  $pagination: PaginationInput
  $clubId: UUID
  $configId: UUID
) {
  leaderboard(period: $period, pagination: $pagination, clubId: $clubId, configId: $configId) {
    items {
      clubPlayerId
      displayName
      user {
        id
        firstName
        lastName
        username
        email
      }
      rank
      totalTournaments
      totalBuyIns
      totalWinnings
      netProfit
      totalItm
      itmPercentage
      roiPercentage
      averageFinish
      firstPlaces
      finalTables
      points
    }
    totalCount
    pageSize
    offset
    hasNextPage
  }
}

query GetBlindStructureTemplates($clubId: ID!) {
  blindStructureTemplates(clubId: $clubId) {
    id
    clubId
    name
    description
    levels {
      levelNumber
      smallBlind
      bigBlind
      ante
      durationMinutes
      isBreak
      breakDurationMinutes
    }
    createdAt
    updatedAt
  }
}

query GetPayoutTemplates($clubId: ID!) {
  payoutTemplates(clubId: $clubId) {
    id
    clubId
    name
    description
    minPlayers
    maxPlayers
    payoutStructure {
      position
      percentage
    }
    createdAt
    updatedAt
  }
}

query GetSuitablePayoutTemplates($clubId: ID!, $playerCount: Int!) {
  suitablePayoutTemplates(clubId: $clubId, playerCount: $playerCount) {
    id
    clubId
    name
    description
    minPlayers
    maxPlayers
    payoutStructure {
      position
      percentage
    }
    createdAt
    updatedAt
  }
}

query AutoPayoutPreview($numPlayers: Int!, $percentPaid: Float) {
  autoPayoutPreview(numPlayers: $numPlayers, percentPaid: $percentPaid) {
    position
    percentage
  }
}
