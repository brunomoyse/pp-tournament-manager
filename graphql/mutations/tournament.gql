mutation AssignTablesToTournament($input: AssignTablesToTournamentInput!) {
  assignTablesToTournament(input: $input) {
    id
    tournamentId
    tableNumber
    maxSeats
  }
}

mutation UnassignTableFromTournament($input: UnassignTableFromTournamentInput!) {
  unassignTableFromTournament(input: $input)
}

mutation AddTournamentEntry($input: AddTournamentEntryInput!) {
  addTournamentEntry(input: $input) {
    id
    tournamentId
    userId
    clubPlayerId
    entryType
    amountCents
    chipsReceived
    recordedBy
    notes
    paymentMethod
    createdAt
    updatedAt
  }
}

mutation EnterTournamentResults($input: EnterTournamentResultsInput!) {
  enterTournamentResults(input: $input) {
    success
    results {
      id
      tournamentId
      userId
      clubPlayerId
      displayName
      finalPosition
      prizeCents
      points
      notes
      createdAt
    }
    deal {
      id
      tournamentId
      dealType
      affectedPositions
      customPayouts {
        userId
        amountCents
      }
      totalAmountCents
      notes
      createdBy
    }
  }
}

mutation UpdateTournamentStatus($input: UpdateTournamentStatusInput!) {
  updateTournamentStatus(input: $input) {
    id
    title
    liveStatus
    status
  }
}

mutation CreateTournament($input: CreateTournamentInput!) {
  createTournament(input: $input) {
    id
    title
    description
    clubId
    startTime
    endTime
    buyInCents
    rakeCents
    seatCap
    status
    liveStatus
    earlyBirdBonusChips
    levelTwoBonusChips
    voucherValueCents
    rebuyMax
    addonChips
    addonPriceCents
    lateRegistrationLevel
    createdAt
    updatedAt
    structure {
      id
      tournamentId
      levelNumber
      smallBlind
      bigBlind
      ante
      durationMinutes
      isBreak
      breakDurationMinutes
    }
  }
}

mutation CancelRegistration($input: CancelRegistrationInput!) {
  cancelRegistration(input: $input) {
    registration {
      id
      status
    }
    promotedPlayer {
      registration {
        id
        status
      }
      displayName
      user {
        id
        firstName
        lastName
      }
    }
  }
}

mutation UpdateTournament($input: UpdateTournamentInput!) {
  updateTournament(input: $input) {
    id
    title
    description
    clubId
    startTime
    endTime
    buyInCents
    rakeCents
    seatCap
    status
    liveStatus
    earlyBirdBonusChips
    levelTwoBonusChips
    voucherValueCents
    rebuyMax
    addonChips
    addonPriceCents
    lateRegistrationLevel
    createdAt
    updatedAt
    structure {
      id
      tournamentId
      levelNumber
      smallBlind
      bigBlind
      ante
      durationMinutes
      isBreak
      breakDurationMinutes
    }
  }
}
